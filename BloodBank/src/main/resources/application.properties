spring.application.name=BloodBank
# ===============================
# DATABASE (MySQL via XAMPP)
# ===============================
spring.datasource.url=jdbc:mysql://localhost:3306/blood_donation?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===============================
# THYMELEAF
# ===============================
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ===============================
# SPRING SECURITY (optional)
# ===============================
# If you want to customize the login page, you can set:
# spring.security.oauth2.client.provider... (not needed for form login)

# ===============================
# LOGGING (optional)
# ===============================
# DEBUG-level Spring Security logging, useful during development.
# Remove or set to INFO before any demo/submission ? very verbose.
logging.level.org.springframework.security=DEBUG